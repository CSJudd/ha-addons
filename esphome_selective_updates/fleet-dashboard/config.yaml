# ESPHome Fleet Manager - Configuration

instances:
  - name: "Production"
    slug: "production"
    config_dir: "/opt/data-services/esphome/production"
    container: "codex-esphome-production"
    dashboard_url: "https://codex:6052"
    enabled: true

  - name: "Lab"
    slug: "lab"
    config_dir: "/opt/data-services/esphome/lab"
